apiVersion: apps/v1
kind: Deployment
metadata:
  name: etshub
  annotations:
    kube-score/ignore: pod-networkpolicy,container-image-tag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: etshub
  template:
    metadata:
      labels:
        app: etshub
    spec:
      securityContext:
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
      imagePullSecrets:
        - name: ghcr-clubcedille-secret
      volumes:
        - name: tmp
          emptyDir: {}
      containers:
        - name: etshub
          image: ghcr.io/clubcedille/etshub:latest
          imagePullPolicy: Always
          env:
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: etshub-secret
                  key: RESEND_API_KEY
                  optional: true
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /manifest.webmanifest
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
              ephemeral-storage: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
              ephemeral-storage: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
