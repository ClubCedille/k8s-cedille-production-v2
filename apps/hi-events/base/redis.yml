apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hi-events-redis-pvc
  namespace: hi-events
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hi-events-redis
  namespace: hi-events
  labels:
    app: hi-events-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hi-events-redis
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: hi-events-redis
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: Always
          ports:
            - containerPort: 6379
          command: ["redis-server", "--appendonly", "yes"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: redis-data
              mountPath: /data
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
              ephemeral-storage: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
              ephemeral-storage: "512Mi"
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: hi-events-redis-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: hi-events-redis
  namespace: hi-events
spec:
  selector:
    app: hi-events-redis
  ports:
    - port: 6379
      targetPort: 6379
