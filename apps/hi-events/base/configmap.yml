apiVersion: v1
kind: ConfigMap
metadata:
  name: hi-events-config
  namespace: hi-events
data:
  VITE_FRONTEND_URL: "https://prodv2.cedille.club"
  VITE_API_URL_CLIENT: "https://prodv2.cedille.club/api"
  VITE_API_URL_SERVER: "http://localhost:8000/api"

  APP_FRONTEND_URL: "https://prodv2.cedille.club"
  APP_DISABLE_REGISTRATION: "false"   # Inscriptions publiques
  LOG_CHANNEL: "stderr"
  CORS_ALLOWED_ORIGINS: "https://prodv2.cedille.club"

  FILESYSTEM_PUBLIC_DISK: "public"
  FILESYSTEM_PRIVATE_DISK: "local"

  DB_CONNECTION: "pgsql"
  DB_HOST: "hi-events-postgres"
  DB_PORT: "5432"
  DB_DATABASE: "hi_events"
  DB_USERNAME: "hi_events"

  REDIS_HOST: "hi-events-redis"
  REDIS_PORT: "6379"

  QUEUE_CONNECTION: "redis"

  MAIL_MAILER: "smtp"
  MAIL_HOST: "smtp.example.com"        # TODO: Remplacer par un serveur SMTP, plus pratique pour envoyer des courriels
  MAIL_PORT: "587"
  MAIL_FROM_ADDRESS: "noreply@cedille.club"
  MAIL_FROM_NAME: "Cedille Events"
