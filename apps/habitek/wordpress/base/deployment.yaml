apiVersion: apps/v1
kind: Deployment
metadata:
  name: habitek-wordpress
  namespace: habitek
  labels:
    app: habitek
  annotations:
    kube-score/ignore: >-
      pod-networkpolicy,
      deployment-has-poddisruptionbudget,
      container-security-context-readonlyrootfilesystem,
      container-security-context-user-group-id
spec:
  selector:
    matchLabels:
      app: habitek
      tier: frontend
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: habitek
        tier: frontend
    spec:
      containers:
        - image: wordpress:6.9.4-php8.2-apache
          imagePullPolicy: Always
          name: habitek-wordpress
          envFrom:
            - secretRef:
                name: habitek-secret
          ports:
            - containerPort: 80
              name: http
          startupProbe:
            tcpSocket:
              port: http
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /wp-login.php
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: habitek-wordpress-persistent-storage
              mountPath: /var/www/html
            - name: php-config
              mountPath: /usr/local/etc/php/conf.d/uploads.ini
              subPath: uploads.ini
          resources:
            requests:
              cpu: 2
              memory: 1024Mi
              ephemeral-storage: 256Mi
            limits:
              cpu: 3
              memory: 2048Mi
              ephemeral-storage: 1Gi
      volumes:
        - name: habitek-wordpress-persistent-storage
          persistentVolumeClaim:
            claimName: habitek-wp-pv-claim
        - name: php-config
          configMap:
            defaultMode: 420
            name: wp-php-config
      securityContext:
        fsGroup: 33
        runAsUser: 33
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: habitek-wp-pv-claim
  namespace: habitek
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: cephfs
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: wp-php-config
data:
  uploads.ini: |-
    file_uploads = On
    upload_max_filesize = 256M
    post_max_size = 256M
    memory_limit = 256M
    max_execution_time = 600
