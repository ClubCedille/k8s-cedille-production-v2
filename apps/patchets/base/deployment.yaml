apiVersion: apps/v1
kind: Deployment
metadata:
  name: commandes
spec:
  selector:
    matchLabels:
      app: commandes
  template:
    metadata:
      labels:
        app: commandes
    spec:
      containers:
        - name: commandes
          image: ghcr.io/clubcedille/patchets-commande:latest
          ports:
            - name: http
              containerPort: 3000
          startupProbe:
            httpGet:
              path: /
              port: http
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /?probe=readiness
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            limits:
              memory: 512Mi
          envFrom:
            - configMapRef:
                name: commandes-config
            - secretRef:
                name: app-secrets
      imagePullSecrets:
        - name: patchets-pull
