apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgresql
  namespace: patchets
  annotations:
    kube-score/ignore: >-
      container-security-context-user-group-id,
      container-security-context-readonlyrootfilesystem
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      containers:
        - name: postgresql
          image: postgres:16.4
          imagePullPolicy: Always
          env:
            - name: POSTGRES_USER
              value: commandes_patchets_user
            - name: POSTGRES_DB
              value: commandes_patchets2
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: commandes-patchets-secret
                  key: password
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - commandes_patchets_user
                - -d
                - commandes_patchets2
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - commandes_patchets_user
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
              ephemeral-storage: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
              ephemeral-storage: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: patchets
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 4Gi
  storageClassName: cephfs
---
apiVersion: v1
kind: Service
metadata:
  name: commandes-db-postgresql
  namespace: patchets
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
  selector:
    app: postgresql
