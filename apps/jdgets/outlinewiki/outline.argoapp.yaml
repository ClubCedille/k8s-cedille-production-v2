apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jdgets-outlinewiki
  namespace: argocd
spec:
  destination:
    namespace: jdgets-outlinewiki
    server: https://cedille.kubernetes.omni.siderolabs.io?cluster=k8s-cedille-production-v2
  project: k8s-cedille-production-v2
  source:
    path: apps/jdgets/outlinewiki/prod
    repoURL: https://github.com/ClubCedille/k8s-cedille-production-v2
    targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
