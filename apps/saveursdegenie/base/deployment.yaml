apiVersion: apps/v1
kind: Deployment
metadata:
  name: saveursdegenie-service
  namespace: saveursdegenie
  annotations:
    kube-score/ignore: pod-networkpolicy,container-image-tag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: saveursdegenie-service
  template:
    metadata:
      labels:
        app: saveursdegenie-service
    spec:
      imagePullSecrets:
        - name: ghcr-clubcedille-secret
      containers:
        - name: saveursdegenie-web
          image: ghcr.io/clubcedille/saveursdegenie.etsmtl.ca:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
              ephemeral-storage: 256Mi
            limits:
              memory: "512Mi"
              cpu: "500m"
              ephemeral-storage: 1Gi
          ports:
            - containerPort: 80
