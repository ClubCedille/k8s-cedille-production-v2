apiVersion: v1
kind: Service
metadata:
  name: planifets-chatbot-qdrant
spec:
  selector:
    app: planifets-chatbot-qdrant
  ports:
    - name: http
      protocol: TCP
      port: 6333
      targetPort: 6333
    - name: grpc
      protocol: TCP
      port: 6334
      targetPort: 6334
  type: ClusterIP
