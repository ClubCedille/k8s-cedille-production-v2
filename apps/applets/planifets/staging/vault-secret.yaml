apiVersion: redhatcop.redhat.io/v1alpha1
kind: VaultSecret
metadata:
  name: planifets-frontend-secret
spec:
  refreshPeriod: 1h
  vaultSecretDefinitions:
    - authentication:
        path: kubernetes
        role: secret-reader
        serviceAccount:
          name: default
      name: frontend
      path: kv/data/planifets-staging/default/frontend
    - authentication:
        path: kubernetes
        role: secret-reader
        serviceAccount:
          name: default
      name: backend
      path: kv/data/planifets-staging/default/backend
  output:
    name: planifets-frontend-secret
    stringData:
      umami_website_id: '{{ .frontend.umami_website_id }}'
      posthog_project_token: '{{ .backend.posthog_project_token }}'
    type: opaque
---
apiVersion: redhatcop.redhat.io/v1alpha1
kind: VaultSecret
metadata:
  name: planifets-secret
spec:
  refreshPeriod: 1h
  vaultSecretDefinitions:
    - authentication:
        path: kubernetes
        role: secret-reader
        serviceAccount:
          name: default
      name: backend
      path: kv/data/planifets-staging/default/backend
    - authentication:
        path: kubernetes
        role: secret-reader
        serviceAccount:
          name: default
      name: cnpg
      path: kv/data/planifets-staging/default/cnpg
  output:
    name: planifets-secret
    stringData:
      db_url: 'postgresql://{{ .cnpg.username }}:{{ .cnpg.password }}@cnpg-rw.planifets-staging.svc.cluster.local:5432/planifetsDB'
      posthog_api_key: '{{ .backend.posthog_api_key }}'
    type: opaque
---
apiVersion: redhatcop.redhat.io/v1alpha1
kind: VaultSecret
metadata:
  name: planifets-secret
spec:
  refreshPeriod: 1h
  vaultSecretDefinitions:
    - authentication:
        path: kubernetes
        role: secret-reader
        serviceAccount:
          name: default
      name: cnpg
      path: kv/data/planifets-staging/default/cnpg
  output:
    name: cnpg-secret
    stringData:
      username: '{{ .cnpg.username }}'
      password: '{{ .cnpg.password }}'
    type: kubernetes.io/basic-auth
