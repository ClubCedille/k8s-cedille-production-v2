name: Demander un site web WordPress

on:
  workflow_dispatch:
    inputs:
      domaine:
        type: string
        required: true
        description: Domaine a utiliser, ex. club.etsmtl.ca
      nom_club:
        type: string
        required: true
        description: Slug du club en minuscules, sans espaces, ex. mon-club
      contexte:
        type: string
        required: false
        description: Contexte sur la demande
      wordpress_image:
        type: string
        required: false
        default: wordpress:6.8.3-php8.2-apache
        description: Image WordPress a deployer
      wordpress_cli_image:
        type: string
        required: false
        default: wordpress:cli-php8.2
        description: Image WP-CLI pour initialiser WordPress
      mysql_image:
        type: string
        required: false
        default: mysql:8.4
        description: Image MySQL a deployer
      wordpress_storage:
        type: string
        required: false
        default: 10Gi
        description: Taille du PVC WordPress, ex. 10Gi
      mysql_storage:
        type: string
        required: false
        default: 10Gi
        description: Taille du PVC MySQL, ex. 10Gi
      cluster_issuer:
        type: choice
        required: false
        default: letsencrypt-http
        description: ClusterIssuer cert-manager a utiliser
        options:
          - letsencrypt-http
          - letsencrypt-prod
          - letsencrypt-staging

jobs:
  create_pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize and validate inputs
        id: vars
        env:
          INPUT_DOMAINE: ${{ github.event.inputs.domaine }}
          INPUT_NOM_CLUB: ${{ github.event.inputs.nom_club }}
          INPUT_WORDPRESS_STORAGE: ${{ github.event.inputs.wordpress_storage }}
          INPUT_MYSQL_STORAGE: ${{ github.event.inputs.mysql_storage }}
          INPUT_WORDPRESS_IMAGE: ${{ github.event.inputs.wordpress_image }}
          INPUT_WORDPRESS_CLI_IMAGE: ${{ github.event.inputs.wordpress_cli_image }}
          INPUT_MYSQL_IMAGE: ${{ github.event.inputs.mysql_image }}
          INPUT_CLUSTER_ISSUER: ${{ github.event.inputs.cluster_issuer }}
          REQUESTER: ${{ github.event.sender.name }}
        run: |
          set -euo pipefail

          deployment_prefix=$(
            python3 - <<'PY'
          import os
          import re
          import unicodedata

          raw = os.environ["INPUT_NOM_CLUB"]
          value = unicodedata.normalize("NFKC", raw).strip().lower()
          value = re.sub(r"[\u2010\u2011\u2012\u2013\u2014\u2212]", "-", value)
          value = re.sub(r"[\s_]+", "-", value)
          value = re.sub(r"-+", "-", value).strip("-")
          print(value)
          PY
          )

          hostname=$(
            python3 - <<'PY'
          import os
          import unicodedata

          print(unicodedata.normalize("NFKC", os.environ["INPUT_DOMAINE"]).strip().lower().rstrip("."))
          PY
          )

          if [[ ! "$deployment_prefix" =~ ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$ ]]; then
            echo "::error::nom_club doit etre un slug DNS: minuscules, chiffres et tirets seulement."
            echo "::error::Valeur recue: '$INPUT_NOM_CLUB' | Valeur normalisee: '$deployment_prefix'"
            exit 1
          fi

          if [ "${#deployment_prefix}" -gt 40 ]; then
            echo "::error::nom_club doit contenir 40 caracteres ou moins."
            exit 1
          fi

          if [[ ! "$hostname" =~ ^[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?(\.[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?)+$ ]]; then
            echo "::error::domaine doit etre un FQDN en minuscules, ex. club.etsmtl.ca."
            echo "::error::Valeur recue: '$INPUT_DOMAINE' | Valeur normalisee: '$hostname'"
            exit 1
          fi

          if [[ ! "$INPUT_WORDPRESS_STORAGE" =~ ^[0-9]+(Mi|Gi|Ti)$ ]]; then
            echo "::error::wordpress_storage doit ressembler a 10Gi, 512Mi ou 1Ti."
            exit 1
          fi

          if [[ ! "$INPUT_MYSQL_STORAGE" =~ ^[0-9]+(Mi|Gi|Ti)$ ]]; then
            echo "::error::mysql_storage doit ressembler a 10Gi, 512Mi ou 1Ti."
            exit 1
          fi

          if [[ ! "$INPUT_WORDPRESS_IMAGE" =~ ^[A-Za-z0-9][A-Za-z0-9._/:@-]*$ ]]; then
            echo "::error::wordpress_image doit etre une reference d'image Docker valide."
            exit 1
          fi

          if [[ ! "$INPUT_WORDPRESS_CLI_IMAGE" =~ ^[A-Za-z0-9][A-Za-z0-9._/:@-]*$ ]]; then
            echo "::error::wordpress_cli_image doit etre une reference d'image Docker valide."
            exit 1
          fi

          if [[ ! "$INPUT_MYSQL_IMAGE" =~ ^[A-Za-z0-9][A-Za-z0-9._/:@-]*$ ]]; then
            echo "::error::mysql_image doit etre une reference d'image Docker valide."
            exit 1
          fi

          if [ -e "apps/$deployment_prefix/wordpress" ]; then
            echo "::error::apps/$deployment_prefix/wordpress existe deja."
            exit 1
          fi

          if grep -R -F \
            -e "fqdn: $hostname" \
            -e "host: $hostname" \
            -e "commonName: $hostname" \
            apps >/dev/null; then
            echo "::error::Le domaine $hostname semble deja etre utilise dans apps/."
            exit 1
          fi

          namespace="$deployment_prefix-wordpress"

          {
            echo "deployment_prefix=$deployment_prefix"
            echo "namespace=$namespace"
            echo "hostname=$hostname"
            echo "j2_vars<<EOF"
            echo "deployment_prefix=$deployment_prefix"
            echo "namespace=$namespace"
            echo "hostname=$hostname"
            echo "wordpress_image=$INPUT_WORDPRESS_IMAGE"
            echo "wordpress_cli_image=$INPUT_WORDPRESS_CLI_IMAGE"
            echo "mysql_image=$INPUT_MYSQL_IMAGE"
            echo "wordpress_storage=$INPUT_WORDPRESS_STORAGE"
            echo "mysql_storage=$INPUT_MYSQL_STORAGE"
            echo "cluster_issuer=$INPUT_CLUSTER_ISSUER"
            echo "requester=$REQUESTER"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create folders
        run: mkdir -p "apps/${{ steps.vars.outputs.deployment_prefix }}/wordpress/prod"

      - name: Create kustomize overlay
        uses: cuchi/jinja2-action@v1.3.0
        with:
          template: bases/wordpress/prod-templates/kustomization.yaml.jinja2
          output_file: apps/${{ steps.vars.outputs.deployment_prefix }}/wordpress/prod/kustomization.yaml
          strict: true
          variables: ${{ steps.vars.outputs.j2_vars }}

      - name: Create WordPress config
        uses: cuchi/jinja2-action@v1.3.0
        with:
          template: bases/wordpress/prod-templates/configMap.yaml.jinja2
          output_file: apps/${{ steps.vars.outputs.deployment_prefix }}/wordpress/prod/configMap.yaml
          strict: true
          variables: ${{ steps.vars.outputs.j2_vars }}

      - name: Create ingress
        uses: cuchi/jinja2-action@v1.3.0
        with:
          template: bases/wordpress/prod-templates/ingress.yaml.jinja2
          output_file: apps/${{ steps.vars.outputs.deployment_prefix }}/wordpress/prod/ingress.yaml
          strict: true
          variables: ${{ steps.vars.outputs.j2_vars }}

      - name: Create vault secret sync
        uses: cuchi/jinja2-action@v1.3.0
        with:
          template: bases/wordpress/prod-templates/vault-secret.yaml.jinja2
          output_file: apps/${{ steps.vars.outputs.deployment_prefix }}/wordpress/prod/vault-secret.yaml
          strict: true
          variables: ${{ steps.vars.outputs.j2_vars }}

      - name: Create argo app
        uses: cuchi/jinja2-action@v1.3.0
        with:
          template: bases/wordpress/prod-templates/argo.yaml.jinja2
          output_file: apps/${{ steps.vars.outputs.deployment_prefix }}/wordpress/${{ steps.vars.outputs.deployment_prefix }}-wordpress.argoapp.yaml
          strict: true
          variables: ${{ steps.vars.outputs.j2_vars }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          title: Create a WordPress website for ${{ steps.vars.outputs.deployment_prefix }}
          branch: wordpress/${{ steps.vars.outputs.deployment_prefix }}
          team-reviewers: |
            SRE
          body: |
            Nom du club: ${{ steps.vars.outputs.deployment_prefix }}
            Domaine: ${{ steps.vars.outputs.hostname }}
            Namespace: ${{ steps.vars.outputs.namespace }}
            Contexte: ${{ inputs.contexte }}

            Le site sera disponible a https://${{ steps.vars.outputs.hostname }} apres la synchronisation Argo CD, la creation du certificat et la configuration DNS.

            WordPress est initialise automatiquement avec l'utilisateur `admin`. Le club peut ensuite se connecter a `/wp-admin`, changer le mot de passe et personnaliser le site.

            Secrets generes par Vault:
            > `kv/data/${{ steps.vars.outputs.namespace }}/default/wordpress`

            Mot de passe admin initial:
            > `kv/data/${{ steps.vars.outputs.namespace }}/default/wordpress/wordpress-admin-password`
          token: ${{ secrets.PULL_REQUEST_TOKEN }}
